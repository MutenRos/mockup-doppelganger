<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Doppelganger · Habbo-style IA Game (mockup)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#0a0e27;color:#e8e8f0;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{background:#141833;padding:.7rem 1.2rem;border-bottom:2px solid #2d3470;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem;color:#7df;letter-spacing:.04em}
header .badge{background:#2d3470;padding:.2rem .6rem;border-radius:99px;font-size:.75rem}
main{flex:1;display:grid;grid-template-columns:240px 1fr 280px;gap:0}
aside{background:#0f1430;padding:1rem;overflow:auto;border-right:1px solid #2d3470}
aside h3{font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:#7df;margin-bottom:.5rem}
.npc{background:#1a1f4a;padding:.5rem;border-radius:6px;margin-bottom:.4rem;cursor:pointer;display:flex;gap:.5rem;align-items:center;font-size:.85rem;border:1px solid transparent}
.npc:hover{border-color:#7df}
.npc.active{border-color:#fa6;background:#2a1f3a}
.dot{width:10px;height:10px;border-radius:50%;background:#5f5;flex-shrink:0}
.dot.busy{background:#fa6}
canvas{display:block;width:100%;height:100%;background:linear-gradient(180deg,#1a2050,#0a0e27)}
#room{position:relative;overflow:hidden}
.tile{position:absolute;width:64px;height:32px;background:#3a4080;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);border:1px solid #5d65a0;opacity:.6}
.player{position:absolute;width:24px;height:36px;background:#fa6;border-radius:4px 4px 2px 2px;transition:.4s;box-shadow:0 4px 0 rgba(0,0,0,.4)}
.player::before{content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:14px;height:14px;background:#fdb;border-radius:50%}
.player.npc1{background:#7df}.player.npc2{background:#f7d}.player.npc3{background:#df7}
.label{position:absolute;font-size:.65rem;background:rgba(0,0,0,.7);padding:1px 4px;border-radius:3px;white-space:nowrap;transform:translate(-50%,-180%)}
#chat{background:#0f1430;display:flex;flex-direction:column;border-left:1px solid #2d3470}
#chat header{background:#1a1f4a;padding:.6rem;border:0;border-bottom:1px solid #2d3470;font-size:.85rem}
.msgs{flex:1;overflow:auto;padding:.6rem;font-size:.82rem}
.msg{margin-bottom:.5rem}
.msg .who{font-weight:600;font-size:.7rem;color:#7df;text-transform:uppercase;letter-spacing:.05em}
.msg.npc1 .who{color:#7df}.msg.npc2 .who{color:#f7d}.msg.npc3 .who{color:#df7}.msg.user .who{color:#fa6}
.msg p{background:#1a1f4a;padding:.4rem .6rem;border-radius:6px;margin-top:.15rem}
form{display:flex;padding:.5rem;border-top:1px solid #2d3470;gap:.3rem}
input{flex:1;background:#1a1f4a;border:1px solid #2d3470;color:#e8e8f0;padding:.45rem;border-radius:4px;font-size:.85rem}
button{background:#fa6;border:0;color:#000;padding:.45rem .8rem;border-radius:4px;cursor:pointer;font-weight:600}
.hud{position:absolute;top:.5rem;left:.5rem;background:rgba(0,0,0,.6);padding:.4rem .6rem;font-size:.75rem;border-radius:4px;font-family:monospace}
.hud span{color:#7df}
</style>
</head>
<body>
<header>
  <h1>🎮 DOPPELGANGER · isometric IA world</h1>
  <span class="badge">v0.4 · mockup</span>
</header>
<main>
  <aside>
    <h3>NPCs en sala</h3>
    <div class="npc active" data-id="npc1"><div class="dot"></div>Aria · investigadora</div>
    <div class="npc" data-id="npc2"><div class="dot busy"></div>Knox · mercader</div>
    <div class="npc" data-id="npc3"><div class="dot"></div>Vex · guardia</div>
    <h3 style="margin-top:1rem">Inventario</h3>
    <div class="npc">🗝️ Llave oxidada</div>
    <div class="npc">📜 Pergamino x3</div>
    <div class="npc">💎 Cristal de éter</div>
    <h3 style="margin-top:1rem">Coords</h3>
    <div style="font-family:monospace;font-size:.75rem;color:#7df">x: 4 · y: 6 · z: 0</div>
  </aside>
  <div id="room">
    <div class="hud">FPS <span>60</span> · sala <span>plaza-norte</span> · agentes <span id="ag">3</span></div>
  </div>
  <div id="chat">
    <header>💬 Chat con <b id="curName">Aria</b></header>
    <div class="msgs" id="msgs"></div>
    <form id="f"><input id="i" placeholder="Habla con la IA..." autocomplete="off"><button>↵</button></form>
  </div>
</main>
<script>
const room=document.getElementById('room');
// build isometric grid
const W=10,H=8,TW=64,TH=32;
const ox=420,oy=80;
function iso(x,y){return [ox+(x-y)*TW/2, oy+(x+y)*TH/2]}
for(let y=0;y<H;y++)for(let x=0;x<W;x++){
  const [px,py]=iso(x,y);
  const t=document.createElement('div');t.className='tile';t.style.left=px+'px';t.style.top=py+'px';
  room.appendChild(t);
}
const players={
  user:{x:4,y:4,cls:'',name:'Tú'},
  npc1:{x:2,y:1,cls:'npc1',name:'Aria'},
  npc2:{x:7,y:5,cls:'npc2',name:'Knox'},
  npc3:{x:5,y:6,cls:'npc3',name:'Vex'}
};
const els={};
for(const k in players){
  const p=players[k];
  const e=document.createElement('div');e.className='player '+p.cls;
  const lbl=document.createElement('div');lbl.className='label';lbl.textContent=p.name;
  e.appendChild(lbl);room.appendChild(e);els[k]=e;move(k);
}
function move(k){const p=players[k];const [px,py]=iso(p.x,p.y);els[k].style.left=(px+20)+'px';els[k].style.top=(py-20)+'px'}
addEventListener('keydown',e=>{
  const p=players.user;const k=e.key;
  if(k==='ArrowUp')p.y=Math.max(0,p.y-1);
  else if(k==='ArrowDown')p.y=Math.min(H-1,p.y+1);
  else if(k==='ArrowLeft')p.x=Math.max(0,p.x-1);
  else if(k==='ArrowRight')p.x=Math.min(W-1,p.x+1);
  else return;e.preventDefault();move('user');
});
// IA mock per NPC
const KB={
  npc1:{persona:'Aria, investigadora racional',hello:'Saludos. Investigo los cristales de éter de esta zona.',
    rules:[[/cristal|éter/i,'Los cristales emiten 3 frecuencias. He cartografiado 47 puntos.'],
           [/llave|puerta/i,'La llave oxidada abre el sótano del museo. Ten cuidado.'],
           [/quién|eres/i,'Soy Aria. Doctora en arqueotecnología.']]},
  npc2:{persona:'Knox, mercader astuto',hello:'¿Compras o vendes? Tengo precios justos. *Casi*.',
    rules:[[/precio|comprar/i,'El pergamino 30 monedas. Si me caes bien, 28.'],
           [/llave/i,'Esa llave… te la quitaría por 200. Te haría un favor.']]},
  npc3:{persona:'Vex, guardia disciplinado',hello:'Identifícate, viajero. Aquí no toleramos magia ilegal.',
    rules:[[/magia|cristal/i,'Los cristales requieren licencia clase B. ¿La tienes?'],
           [/quién|eres/i,'Sargento Vex. Patrullo este sector desde la Caída.']]}
};
let cur='npc1';
const msgs=document.getElementById('msgs');
function add(who,txt,cls){const d=document.createElement('div');d.className='msg '+cls;d.innerHTML=`<div class="who">${who}</div><p>${txt}</p>`;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight}
function greet(){msgs.innerHTML='';add(KB[cur].persona.split(',')[0],KB[cur].hello,cur)}
greet();
document.querySelectorAll('.npc[data-id]').forEach(el=>el.onclick=()=>{
  document.querySelectorAll('.npc').forEach(n=>n.classList.remove('active'));el.classList.add('active');
  cur=el.dataset.id;document.getElementById('curName').textContent=KB[cur].persona.split(',')[0];greet();
});
document.getElementById('f').onsubmit=e=>{
  e.preventDefault();const i=document.getElementById('i');const t=i.value.trim();if(!t)return;
  add('Tú',t,'user');i.value='';
  setTimeout(()=>{
    const r=KB[cur].rules.find(([rx])=>rx.test(t));
    add(KB[cur].persona.split(',')[0], r?r[1]:'(...la IA reflexiona sobre tu pregunta...)', cur);
  },420);
};
</script>
</body></html>
